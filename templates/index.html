<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Credit Card Approval Prediction</h1>

    <form action="/predict" method="POST">

        <div class="row">
            <div class="input-box">
                <label>Gender</label>
                <select name="Gender" required>
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <div class="input-box">
                <label>Age</label>
                <input type="number" step="0.1" name="Age" required>
            </div>
        </div>

        <div class="row">
            <div class="input-box">
                <label>Debt</label>
                <input type="number" step="0.01" name="Debt" required>
            </div>

            <div class="input-box">
                <label>Married</label>
                <select name="Married" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="input-box">
                <label>Bank Customer</label>
                <select name="BankCustomer" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="input-box">
                <div class="input-box">
    <label>Occupation / Industry</label>
    <select name="Industry" required>
        <option value="IT">Information Technology</option>
        <option value="Banking">Banking</option>
        <option value="Business">Business</option>
        <option value="Government">Government</option>
        <option value="Healthcare">Healthcare</option>
        <option value="Education">Education</option>
        <option value="Manufacturing">Manufacturing</option>
        <option value="Retail">Retail</option>
        <option value="Construction">Construction</option>
        <option value="Agriculture">Agriculture</option>
        <option value="Transport">Transport</option>
        <option value="Telecom">Telecommunication</option>
        <option value="Hospitality">Hospitality</option>
        <option value="Other">Other</option>
    </select>
</div>
            </div>
        </div>

        <div class="row">
            <div class="input-box">
                <div class="input-box">
    <label>Ethnicity</label>
    <select name="Ethnicity" required>
        <option value="Asian">Asian</option>
        <option value="White">White</option>
        <option value="Black">Black</option>
        <option value="Hispanic">Hispanic</option>
        <option value="Other">Other</option>
    </select>
</div>
            </div>

            <div class="input-box">
                <label>Years Employed</label>
                <input type="number" step="0.1" name="YearsEmployed" required>
            </div>
        </div>

        <div class="row">
            <div class="input-box">
                <label>Prior Default</label>
                <select name="PriorDefault" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="input-box">
                <label>Employed</label>
                <select name="Employed" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="input-box">
                <label>Credit Score</label>
                <input type="number" name="CreditScore" required>
            </div>

            <div class="input-box">
                <label>Driver's License</label>
                <select name="DriversLicense" required>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="input-box">
                <div class="input-box">
    <label>Citizenship Status</label>
    <select name="Citizen" required>
        <option value="Citizen">Citizen</option>
        <option value="Permanent Resident">Permanent Resident</option>
        <option value="Foreign National">Foreign National</option>
    </select>
</div>
            </div>

            <div class="input-box">
                <label>Zip Code</label>
                <input type="number" name="ZipCode" required>
            </div>
        </div>

        <div class="row">
            <div class="input-box">
                <label>Income</label>
                <input type="number" name="Income" required>
            </div>
        </div>

        <button type="submit">Predict</button>

    </form>

</div>

</body>
</html>
