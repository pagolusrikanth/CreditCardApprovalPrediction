<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Credit Card Approval Prediction</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>💳 Credit Card Approval Prediction</h1>
    <p class="subtitle">Enter Applicant Details</p>

    <form action="/predict" method="POST">

        <!-- Row 1 -->

        <div class="row">

            <div class="input-box">
                <label>Gender</label>
                <select name="Gender" required>
                    <option value="">Select Gender</option>
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <div class="input-box">
                <label>Age</label>
                <input type="number" step="0.1" name="Age" required>
            </div>

        </div>

        <!-- Row 2 -->

        <div class="row">

            <div class="input-box">
                <label>Debt</label>
                <input type="number" step="0.01" name="Debt" required>
            </div>

            <div class="input-box">
                <label>Married</label>
                <select name="Married" required>
                    <option value="">Select</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

        </div>

        <!-- Row 3 -->

        <div class="row">

            <div class="input-box">
                <label>Bank Customer</label>
                <select name="BankCustomer" required>
                    <option value="">Select</option>
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="input-box">
                <label>Industry</label>

                <select name="Industry" required>

                    <option value="">Select Industry</option>

                    <option value="CommunicationServices">Communication Services</option>

                    <option value="ConsumerDiscretionary">Consumer Discretionary</option>

                    <option value="ConsumerStaples">Consumer Staples</option>

                    <option value="Education">Education</option>

                    <option value="Energy">Energy</option>

                    <option value="Financials">Financials</option>

                    <option value="Healthcare">Healthcare</option>

                    <option value="Industrials">Industrials</option>

                    <option value="InformationTechnology">Information Technology</option>

                    <option value="Materials">Materials</option>

                    <option value="Real Estate">Real Estate</option>

                    <option value="Research">Research</option>

                    <option value="Transport">Transport</option>

                    <option value="Utilities">Utilities</option>

                </select>

            </div>

        </div>

        <!-- Row 4 -->

        <div class="row">

            <div class="input-box">

                <label>Ethnicity</label>

                <select name="Ethnicity" required>

                    <option value="">Select Ethnicity</option>

                    <option value="Asian">Asian</option>

                    <option value="Black">Black</option>

                    <option value="Latino">Latino</option>

                    <option value="Other">Other</option>

                    <option value="White">White</option>

                </select>

            </div>

            <div class="input-box">
                <label>Years Employed</label>
                <input type="number" step="0.1" name="YearsEmployed" required>
            </div>

        </div>

        <!-- Row 5 -->

        <div class="row">

            <div class="input-box">

                <label>Prior Default</label>

                <select name="PriorDefault" required>

                    <option value="">Select</option>

                    <option value="1">Yes</option>

                    <option value="0">No</option>

                </select>

            </div>

            <div class="input-box">

                <label>Employed</label>

                <select name="Employed" required>

                    <option value="">Select</option>

                    <option value="1">Yes</option>

                    <option value="0">No</option>

                </select>

            </div>

        </div>

        <!-- Row 6 -->

        <div class="row">

            <div class="input-box">

                <label>Credit Score</label>

                <input type="number" name="CreditScore" required>

            </div>

            <div class="input-box">

                <label>Driver's License</label>

                <select name="DriversLicense" required>

                    <option value="">Select</option>

                    <option value="1">Yes</option>

                    <option value="0">No</option>

                </select>

            </div>

        </div>

        <!-- Row 7 -->

        <div class="row">

            <div class="input-box">

                <label>Citizen</label>

                <select name="Citizen" required>

                    <option value="">Select</option>

                    <option value="ByBirth">By Birth</option>

                    <option value="ByOtherMeans">By Other Means</option>

                    <option value="Temporary">Temporary</option>

                </select>

            </div>

            <div class="input-box">

                <label>Zip Code</label>

                <input type="number" name="ZipCode" required>

            </div>

        </div>

        <!-- Row 8 -->

        <div class="row">

            <div class="input-box">

                <label>Income</label>

                <input type="number" name="Income" required>

            </div>

        </div>

        <button type="submit" class="btn">

            Predict Approval

        </button>

    </form>

</div>

</body>
</html>
